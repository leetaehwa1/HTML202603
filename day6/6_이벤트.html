<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <img id="img" src="../media/깃허브.jpg" width="200px" height="200px">

</body>
</html>
<script>
    let imgList =[
        "../media/인스타.jpg",
        "../media/네이버.jpg",
        "../media/레서판다.jpg"
    ];
    let img = document.querySelector("#img");
    // img.addEventListener("click", ()=>{
    //     img.src = "../media/인스타.jpg"; 
    // });
    img.addEventListener("mouseover", ()=>{
       let ran = Math.floor(Math.random()*3);
       img.src = imgList[ran];
    })
    img.addEventListener("mouseout", ()=>{
        img.src="../media/깃허브.jpg";
    })
    


    // 이벤트 종류
    // click => 마우스 클릭 했을 때
    // dbclick => 더블 클릭 했을 때
    // mouseover, mouseout => 마우스 올라갔을 때, 떨어졌을 때
    // mousedown => 마우스 눌렀을 때
    // mouseup => 마우스 누르고 있다가 뗄 때
    // mousemove => 마우스 움직일 때        
</script>
