    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>회원가입</title>
        <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <style>
            #app{}
            #container{
                background-color: maroon;
                width: 600px;
                height: 750px;
                margin: 50px auto;
                border: 2px solid white;
                border-left: 1px solid whitesmoke;
                border-top: 1px solid whitesmoke;
                border-radius: 20px;
                color: black;
                text-align: center;
            }
            h1{
                margin-top: 50px;
                color: linen;
            }
            h3{
                font-weight: lighter;
                font-size: medium;
                color: linen;
            }
            .user{
                color: aliceblue;
                text-align: left;
                margin-top: 20px;
                margin-left: 40px;
                font-weight: bold;
            }

            .box1{
                margin-left: 35px;
                margin-right: 35px;
                border: 1px solid #eee;
                padding: 10px;
                margin-top: 5px;
                border-radius: 15px;
                width: 510px;
                height: 20px;
            }
            .box2{
                margin-right: 35px;
                border: 1px solid #eee;
                padding: 10px;
                margin-top: 5px;
                border-radius: 15px;
                width: 550px;
                height: 20px;
            }
            button{
                width: 500px;
                height: 50px;
                margin-top: 50px;
                background-color: rgb(3, 15, 37);
                border-radius: 15px;
                text-align: center;
                font-size: large;
                font-weight: bold;
                color: whitesmoke;
            }
            
            .login{
                margin-top: 30px;
                color: #ccc;
            }
            a{
                text-decoration: none;
                color: cornflowerblue;
                font-weight: bold;
            }
            .id-row{
                display:flex;
                align-items:center;
                margin-left:35px;
                margin-right:35px;
            }

            .id-row .box1{
                width:380px;
            }

            .check-btn{
                width:120px;
                height:42px;
                margin-top:5px;
            }
        </style>
    </head>
    <body>
        <div id="app">
        <div id="container">
            <h1>회원가입</h1>
            <h3>새로운 계정을 만들어 서비스를 시작하세요.</h3>
            <div class="user">이름</div>
                <input class="box1" type="text" placeholder="홍길동">

            <div class="user">아이디</div>
                <div class="id-row">
                    <input class="box2"
                        type="text"
                        v-model="userId"
                        :disabled="idChecked"
                        placeholder="아이디를 입력해주세요.">

                    <button class="check-btn" @click="fnCheck">중복체크</button>
                </div>
            <div class="user">비밀번호</div>
                <input class="box1" type="password" placeholder="8자 이상 입력">

            <div class="user">비밀번호 확인</div>
                <input class="box1" type="password" placeholder="비밀번호를 다시 입력하세요.">
            <button :disabled="!idChecked" onclick="location.href='../day7/98_login.html'" disabled>가입하기</button>

            <div class="login">이미 계정이 있으신가요? <a href="../day7/98_login.html">로그인</a></div>
            
            </div>
        </div>
    </body>
    </html>
    <script>
            const app = Vue.createApp({
                data() {
                    return {
                        // 변수 - (key : value)
                        userId :"",
                        idChecked : false
                    };
                },
                methods: {
                    // 함수(메소드) - (key : function())
                    fnCheck: function () {
                        console.log("로그인 클릭됨.")
                        let self = this;
                        if(self.userId.trim() === ""){
                            alert("아이디를 입력하세요.");
                            return;
                        }
                        // let param = {
                        //     userId : self.userId,
                        //     pwd : self.pwd
                        // };

                        $.ajax({
                            url: "http://192.168.30.57:3009/id-check",
                            dataType: "json",
                            type: "GET",
                            // data : param,
                            data: {userId : self.userId},
                            success: function (data) {
                                console.log(data);

                                if(data.exists){
                                    alert("이미 사용중인 아이디입니다.");
                                }else{
                                    alert("사용 가능한 아이디입니다.");
                                    self.idChecked = true;   // 여기서 입력칸 disable + 가입버튼 활성화
                                }
                            }
                        });
                    }
                }, // methods
                mounted() {
                    // 처음 시작할 때 실행되는 부분
                }
            });

            app.mount('#app');
        </script>
