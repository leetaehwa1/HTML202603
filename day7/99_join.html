<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <style>
        #container{
            background-color: maroon;
            width: 600px;
            height: 750px;
            margin: 50px auto;
            border: 2px solid white;
            border-left: 1px solid whitesmoke;
            border-top: 1px solid whitesmoke;
            border-radius: 20px;
            color: black;
            text-align: center;
        }
        h1{
            margin-top: 50px;
            color: linen;
        }
        h3{
            font-weight: lighter;
            font-size: medium;
            color: linen;
        }
        .user{
            color: aliceblue;
            text-align: left;
            margin-top: 20px;
            margin-left: 40px;
            font-weight: bold;
        }

        .box1{
            background-color: thistle;
            margin-left: 35px;
            margin-right: 35px;
            border: 1px solid #eee;
            padding: 10px;
            margin-top: 5px;
            border-radius: 15px;
            width: 510px;
            height: 20px;
        }
        button{
            width: 500px;
            height: 50px;
            margin-top: 50px;
            background-color: rgb(3, 15, 37);
            border-radius: 15px;
            text-align: center;
            font-size: large;
            font-weight: bold;
            color: whitesmoke;
        }
        button:hover{
            background-color: #ddd;
            cursor: pointer;
        }
        .login{
            margin-top: 30px;
            color: #ccc;
        }
        a{
            text-decoration: none;
            color: cornflowerblue;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>회원가입</h1>
        <h3>새로운 계정을 만들어 서비스를 시작하세요.</h3>
        <div class="user">이름</div>
            <input class="box1" type="text" placeholder="홍길동">

        <div class="user">아이디</div>
            <input class="box1" type="text" placeholder="아이디를 입력해주세요.">

        <div class="user">비밀번호</div>
            <input class="box1" type="password" placeholder="8자 이상 입력">

        <div class="user">비밀번호 확인</div>
            <input class="box1" type="password" placeholder="비밀번호를 다시 입력하세요.">
        <button onclick="location.href='../day7/98_login.html'">가입하기</button>

        <div class="login">이미 계정이 있으신가요? <a href="../day7/98_login.html">로그인</a></div>
        
        
    </div>
</body>
</html>
