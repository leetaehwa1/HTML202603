<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .top-menu{
            display: inline-block;
        }
        .main-menu{
            background-color: green;
            color: white;
            font-weight: bold;
            width: 150px;
            padding: 10px;
            box-sizing: border-box;
            cursor: pointer;
        }
        .sub-menu{
            background-color: antiquewhite;
            width: 150px;
            box-sizing: border-box;
            display: none;
        }
        
        .sub-menu a{
            display: block;
            padding: 10px;
            cursor: pointer;
        }
        .top-menu:hover .sub-menu{
            display: block;
        }
        .sub-menu :hover{
            background-color: ivory;
        }
    </style>
</head>
<body>
    <div class="top-menu">
     <div class="main-menu">Dropdown</div>
        <div class="sub-menu">
            <a>Menu 1</a>
            <a>Menu 2</a>
            <a>Menu 3</a>
     </div>
    </div>
</body>
</html>
