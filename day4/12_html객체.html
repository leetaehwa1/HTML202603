<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Dom -->
     <!-- Document Object Model -->

    <div>
        <label>숫자 1 :<input id="num1" placeholder="첫 번째 숫자"></label>
    </div>
     <div>
        <label>숫자 2 :<input id="num2" placeholder="두 번째 숫자"></label>
    </div>
    <div>
        <button onclick="fnSum()">더하기!</button>
        <button onclick="fnCompare()">비교!</button>
    </div>
</body>
</html>
<script>
    function fnSum(){
        let num1 = document.querySelector("#num1").value;
        let num2 = document.querySelector("#num2").value;
        // 문자를 숫자로 바꾸는 함수 parseInt, Number
        alert("두 수의 합은 " + (parseInt(num1)+Number(num2)));
        console.log(parseInt(num1)+parseInt(num2));
    }

    function fnCompare(){
        //input 에 입력한 두 수가 같으면 '같다' 출력,
        //아니면 '다르다' 출력
        let num1 = document.querySelector("#num1").value;
        let num2 = document.querySelector("#num2").value;
        if(parseInt(num1)==parseInt(num2)){
            alert("같다");
        }else{
            alert("다르다")
        }
    }
</script>
