<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 600px;
            height: 400px;
        }
        .grad1{
            /* 선형 그라데이션 */
            background: blue; /* 그라데이션을 지원 안하는 환경에서 보이는  색 */
            background: linear-gradient(to right bottom,blue,white);
        }
        .grad2{
            /*  */
            background: blue; /* 그라데이션을 지원 안하는 환경에서 보이는  색 */
            background: linear-gradient(45deg,blue,aqua,white);
        }
        .grad3{
            /*  */
            background: blue; /* 그라데이션을 지원 안하는 환경에서 보이는  색 */
            background: linear-gradient(90deg,blue 10%,aqua 70%,white 100%);
        }
    </style>
</head>
<body>
    <div class="grad3"></div>
    
</body>
</html>
