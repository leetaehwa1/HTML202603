<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 style="color: red; font-style: italic; cursor: pointer;" onclick="fnChange()" id="txt">HTML 너무 재밌어요!</h1>
    
</body>
</html>
<script>
    function fnChange(){
        let obj = document.querySelector("#txt");
        console.log(obj.style.color);
         console.log(obj.style.fontStyle);
         if(obj.style.color == "red"){
        obj.style.color = "black";
        obj.style.fontStyle = "normal";
         }else{
            obj.style.color = "red"
            obj.style.fontStyle = "italic";
         }
        
        
    }
</script>
