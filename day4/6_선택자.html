<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        table, tr, th, td{
            border: 2px solid black;
            padding: 5px 10px;
            text-align: center;
            border-collapse: collapse;

        }
        tr:nth-child(2){ /* tr 태그 중에 2번 째 요소만 적용 */
            color: blue;
        }
        /* 2n, even 짝수 번째 */
        /* 2n+1 , odd 홀수 번째 */
        tr:nth-child(2n){ /* tr 태그 중에 2번 째 요소만 적용 */
            background-color: #ccc;
        }
        tr:first-child{
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>이름</th>
            <th>자바</th>
            <th>오라클</th>
            <th>html</th>
        </tr>
        <tr>
            <td>홍길동</td>
            <td>90</td>
            <td>85</td>
            <td>80</td>
        </tr>
         <tr>
            <td>김철수</td>
            <td>80</td>
            <td>90</td>
            <td>100</td>
        </tr>
         <tr>
            <td>박영희</td>
            <td>93</td>
            <td>82</td>
            <td>83</td>
        </tr>
         <tr>
            <td>유재석</td>
            <td>100</td>
            <td>98</td>
            <td>99</td>
        </tr>
    </table>
</body>
</html>
