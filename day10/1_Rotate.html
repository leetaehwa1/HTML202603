<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: #e2ecf6;
        }
        #container{
            width: 800px;
            margin: 100px auto;
        }
        .box{
            text-align: center;
            width: 150px;
            height: 150px;
            background-color: blue;
            border-radius: 15px;
            color: white;
            text-align: center;
            line-height: 150px;
            margin: 50px;
            /* 변화가 생겼을 때 자연스럽게 움직이도록 하는 속성 */
            transition: transform 1.5s ease;
            /* linear : 디폴트, 처음부터 끝까지 같은 속도*/
            /* ease : 천천히 시작, 중간에 빠름, 끝날 때 천천히 => 가장 자연스러움 */
            /* ease-in : 천천히 시작했다가 -> 끝날 때 빠르게 끝남. */
            /* ease-out : 빨리 시작했다가 -> 끝날 때 느리게 끝남 */
            /* ease-in-out : ease랑 비슷 좀 더 부드럽다. */
        }
        .rotate1{
            transform: rotate(45deg);
        }
        .rotate2{
            transform: rotate(-45deg);
        }
        .rotate3{
            transform: rotate(0.5turn);
        }
        .rotate4{
            /* 회전하는 기준점은 원래 center가 기준 */
            /* 기준점이 왼쪽 상단(top left) */ 
            transform-origin: top left ;
            transform: rotate(45deg);
        }
        .rotate5{
            transform: rotate(0deg);
        }
        .rotate5:hover{
            transform: rotate(360deg);
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="box rotate4 ">Rotate</div>
        <hr>
        <div class="box rotate1">Rotate</div>
        <hr>
        <div class="box rotate5">Rotate</div>
    </div>
</body>
</html>
