<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container > div{
            border: 1px solid black;
            text-align: center;
            padding: 10px;
        }
        #container{
            display: grid;
            gap: 10px;
            grid-template-columns: 200px 1fr;
            grid-template-rows: 125px minmax(600px,auto) 150px;
            grid-template-areas: 
            "header header"
            "side content"
            "footer footer"; 
        }
        @media screen and (max-width : 768px){
            #container{
                display: flex;
            }
        }

        #widget-box{
            position: relative;
            float: left;
            margin: 10px 10px;
            width: 280px;
            height: 150px;
            border-radius: 10px;
            border: 1px 1px #eee;
            background-color: white;
            box-sizing: border-box;
        }
        .header{
            grid-area: header;
            background-color: chocolate;
            border-radius: 15px;
        }
        .side{
            grid-area: side;
            border-radius: 15px;
            background-color: aquamarine;
        }
        .content{
            position: grid;
            grid-area: content;
            border-radius: 15px;
            background-color: #eee;
        }
        .footer{
            grid-area: footer;
            border-radius: 15px;
            background-color: skyblue;
        }
        h2{
            position: absolute;
            left: 20px;
        }
        .widget{
            position: grid;
            position: absolute;
            margin-left: 20px;
            margin-top: 90px;
            font-weight: bold;
        }
        

    </style>

</head>
<body>
    <div id="container">
        <div class="header">헤더영역</div>
        <div class="side">사이드 영역</div>
        <div class="content">
            <div id="widget-box">
                <h2>위젯1</h2>
                <div class="widget">방문자 수 : 1,234명</div>
            </div>
            <div id="widget-box">
                <h2>위젯2</h2>
                <div class="widget">매출 : 5,123,120원</div>
            </div>
            <div id="widget-box">
                <h2>위젯3</h2>
                <div class="widget">신규 가입 :42명</div>
            </div>
            <div id="widget-box">
                <h2>위젯4</h2>
                <div class="widget">서버 상태 : 양호</div>
            </div>
            <div id="widget-box">
                <h2>위젯5</h2>
                <div class="widget">최근 알림이 없습니다.</div>
            </div>
            
        </div>
        <div class="footer">푸터</div>
        
    </div>
</body>
</html>
