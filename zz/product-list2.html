<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@8.4.7/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@8.4.7/swiper-bundle.min.js"></script>
    <style>
        table, tr, td, th {
            border : 1px solid black;
            text-align: center;
            border-collapse: collapse;
            padding : 10px 20px;
        }
        .search-area{
            margin: 10px;
        }
        .search-input{
            margin-right: 5px;
            outline: none;
        }
        .search-area select{
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- html. 반드시 id가 app인 태그 안에서 작업 -->
        <!-- (script 맨 하단 app.mount('#app'); 여기 아이디와 같아야 함) -->
         <!-- 제품번호, 제품명, 브랜드명 ,가격, 출시일 -->
          <div id="container">
            <div id="product-table">
                <div class="search-area">
                    <label>검색어 : <input @keyup.enter="fnList" v-model="keyword" class="search-input">
                        <button @click="fnList">검색</button></label>
                        <select v-model="brand" @change="fnList">
                            <option value="">:: 선택 ::</option>
                            <option value="삼성">:: 삼성 ::</option>
                            <option value="애플">:: 애플 ::</option>
                            <option value="LG">:: LG ::</option>
                            <option value="소니">:: 소니 ::</option>
                            <option value="마이크로소프트">:: 마이크로소프트 ::</option>
                            <option value="닌텐도">:: 닌텐도 ::</option>
                            <option value="다이슨">:: 다이슨 ::</option>
                        </select>
                </div>
                <table>
                    <tr>
                        <th><input type="checkbox" v-model="allChecked" @change="fnAllCheck">선택</th>
                        <th>제품번호</th>
                        <th>제품명</th>
                        <th>브랜드명</th>
                        <th>가격</th>
                        <th>출시일</th>
                        <th>삭제</th>
                    </tr>
                    <tr v-for="item in list">
                        <td><input type="checkbox" v-model="productIdList" :value="item.PRODUCT_ID"></td>
                        <td>{{item.PRODUCT_ID}}</td>
                        <td>{{item.PRODUCT_NAME}}</td>
                        <td>{{item.BRAND}}</td>
                        <td>{{item.PRICE}}</td>
                        <td>{{item.RELEASE}}</td>
                        <td><button @click="fnBtnRemove(item.PRODUCT_ID)">삭제</button></td>
                    </tr>
                    <tr v-if="list.length == 0">
                        <td colspan="7">등록된 제품이 없습니다.</td>
                    </tr>
                </table>
                <div>
                    <button @click="fnRemove">삭제</button>
                </div>
            </div>
          </div>
    
    </div>
</body>
</html>

<script>
    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
                list : [],
                keyword : "",
                brand: "",
                productIdList : [],
                allChecked : false
            };
        },
        methods: {
            // 함수(메소드) - (key : function())
            fnList: function () {
                let self = this;
                $.ajax({
                    url: "http://192.168.30.57:3009/product/list",
                    dataType: "json",
                    type: "GET",
                    data: {keyword : self.keyword, brand : self.brand},
                    success: function (data) {
                        console.log(data);
                        self.list = data.productList;
                    }
                });
            }
            ,
            fnRemove : function(){
                let self = this;
                if(!confirm("정말 삭제?")){
                    return;
                }
                console.log(self.productIdList);

                 $.ajax({
                    url: "http://192.168.30.57:3009/product/delete-list",
                    dataType: "json",
                    type: "GET",
                    traditional:true,
                    data: {productIdList : self.productIdList},
                    success: function (data) {
                        self.fnList();
                    }
                });
                
            },
            fnBtnRemove : function(pid){
                let self = this;
                console.log(pid);
                
                $.ajax({
                    url: "http://192.168.30.57:3009/product/delete",
                    dataType: "json",
                    type: "GET",
                    data: {productId : pid},
                    success: function (data) {
                        self.fnList();
                    }
                });
            },
            fnAllCheck: function () {
                let self = this;
               
                // if(self.productIdList.length != 0){
                //     self.productIdList = [];
                // }else{
                //     self.productIdList = [];
                //     for(let i=0;i<self.list.length;i++){
                //     self.productIdList.push(self.list[i].PRODUCT_ID);
                // }
                // }


              
                if (self.allChecked) {
                    // 전체 선택
                    // self.productIdList = self.list.map(item => item.PRODUCT_ID);
                        for(let i=0;i<self.list.length;i++){
                        self.productIdList.push(self.list[i].PRODUCT_ID);
                }
                } else {
                    // 전체 해제
                    self.productIdList = [];
                }
}
        }, // methods
        mounted() {
            // 처음 시작할 때 실행되는 부분
                let self = this;
               this.fnList();
        }
    });

    app.mount('#app');
</script>
