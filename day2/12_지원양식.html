<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            margin:20px;
        }
    </style>
</head>
<body>
    <legend style="font-weight: bold; text-align: center; font-size: 30px;">지원 양식</legend>
    <fieldset style="text-align: left;width: 50px; height: 500px; margin: 20px auto;">
        
        <div style="color: red; font-size: small;">*빨간색은 필수 입력입니다.
        </div>

        <div>
        <label style="color: red;"> 이름 : <input type="text" autofocus placeholder="이름을 입력해주세요."></label>
        </div>

        <div>
            <label>학과 : <input type="text" placeholder="학과를 입력해주세요."></label>
        </div>
       <div> 
            <label style="color: red;">연락처 : <input type=""</label>
        </div>
       <div>
            <span style="color: red;">성별 : </span>
            <label><input type="radio" name="gender">남자</label>
            <label><input type="radio" name="gender">여자</label>
        </div>
        <div>
            관심언어 :
            <label><input type="checkbox"name="hobby">자바</label>
            <label><input type="checkbox"name="hobby">파이썬</label>
            <label><input type="checkbox"name="hobby">C</label>
            <label><input type="checkbox"name="hobby">C#</label>
            <label><input type="checkbox"name="hobby">기타 언어</label>
        </div>
        <div>
            <textarea rows="10" cols="50" placeholder="자기소개"></textarea>
        </div>
         <div style="text-align: center;">
                <button>가입하기</button>
                <button>취소</button>
            </div>
    </fieldset>
    
</body>
</html>
