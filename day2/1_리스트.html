<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 목록화 할 때 사용하는 태그 (ol, ul) -->
     <!--ul(unorderlist)태그는 순서가 없는 목록을 작성할 때  -->
    <ul>
        <li>자바</li>
        <li>오라클</li>
        <li>HTML</li>
     </ul>

     <hr>
     <!-- ol(orderlist는 순서가 있는 목록을 작성할 때) -->
     <ol>
        <li>자바</li>
        <li>오라클</li>
        <li>HTML</li>
     </ol>

      <hr>
     
     <ol type="A" reversed>
        <li>자바</li>
        <li>오라클</li>
        <li>HTML</li>
     </ol>
     
</body>
</html>
